name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: gradle
        
    - name: Install dependencies
      run: |
        npm ci
        
    - name: Build web app
      run: |
        # Just copy the public folder for now
        echo "Web app ready"
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Build APK
      run: |
        # Clone Capacitor if needed and set up
        echo "Build APK placeholder - ready for actual build"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mobile-game
        path: |
          **/*.apk
        retention-days: 7
